name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:

  # ── Backend unit + integration tests ────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       portfolio_test
          POSTGRES_USER:     portfolio_user
          POSTGRES_PASSWORD: ci_test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/portfolio_test
          SPRING_DATASOURCE_USERNAME: portfolio_user
          SPRING_DATASOURCE_PASSWORD: ci_test_pass
          SPRING_MAIL_PASSWORD:       dummy-not-used-in-tests
          JWT_SECRET_KEY:             ci-test-secret-key-must-be-at-least-64-chars-long-for-hs256-algo
        run: ./mvnw test --no-transfer-progress

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:unit -- --run
