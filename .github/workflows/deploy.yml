name: Keep Backend Alive

# GitHub Actions minimum cron is every 5 minutes.
# Inside each run we ping 3 times with 90s gaps → ~90s interval continuously.
on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes, 24/7
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    name: Ping Render Backend
    runs-on: ubuntu-latest

    steps:
      - name: Ping 1
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://portfolio-1-tv5f.onrender.com/ping)
          echo "Ping 1 → $STATUS"

      - name: Wait 90s
        run: sleep 90

      - name: Ping 2
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://portfolio-1-tv5f.onrender.com/ping)
          echo "Ping 2 → $STATUS"

      - name: Wait 90s
        run: sleep 90

      - name: Ping 3
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://portfolio-1-tv5f.onrender.com/ping)
          echo "Ping 3 → $STATUS"
