name: Keep Backend Alive

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum interval.
    # Prevents Render free tier from sleeping the backend.
    - cron: '*/5 * * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Wake up backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://portfolio-backend.onrender.com/actuator/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          else
            echo "Backend is alive"
          fi
