# Production compose — uses pre-built images from GHCR.
# Run on your VPS: docker compose -f docker-compose.prod.yml up -d
# Images are built and pushed by the GitHub Actions deploy workflow.

services:

  postgres:
    image: postgres:16-alpine
    container_name: portfolio_db
    environment:
      POSTGRES_DB:       portfolio
      POSTGRES_USER:     portfolio_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/codenerd42/portfolio-backend:latest
    container_name: portfolio_backend
    environment:
      SPRING_DATASOURCE_URL:           jdbc:postgresql://postgres:5432/portfolio
      SPRING_DATASOURCE_USERNAME:      portfolio_user
      SPRING_DATASOURCE_PASSWORD:      ${DB_PASSWORD}
      SPRING_MAIL_PASSWORD:            ${MAIL_PASSWORD}
      JWT_SECRET_KEY:                  ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS:            ${CORS_ALLOWED_ORIGINS:-https://priyanshu-portfolio.dev}
      SPRING_JPA_SHOW_SQL:             "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "false"
    ports:
      - "8080:8080"         # priyanshu.dev → this port via reverse proxy
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio_net
    restart: unless-stopped

  frontend:
    image: ghcr.io/codenerd42/portfolio-frontend:latest
    container_name: portfolio_frontend
    ports:
      - "80:80"             # priyanshu-portfolio.dev → port 80
    networks:
      - portfolio_net
    restart: unless-stopped

networks:
  portfolio_net:
    driver: bridge

volumes:
  postgres_data:
