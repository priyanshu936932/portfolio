services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_db
    environment:
      POSTGRES_DB:       portfolio
      POSTGRES_USER:     portfolio_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    environment:
      # Override application.properties values via Spring's relaxed binding
      SPRING_DATASOURCE_URL:              jdbc:postgresql://postgres:5432/portfolio
      SPRING_DATASOURCE_USERNAME:         portfolio_user
      SPRING_DATASOURCE_PASSWORD:         ${DB_PASSWORD}
      SPRING_MAIL_PASSWORD:               ${MAIL_PASSWORD}
      JWT_SECRET_KEY:                     ${JWT_SECRET_KEY}
      # Nginx is the only thing that talks to the backend, so allow localhost
      CORS_ALLOWED_ORIGINS:               ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Production-safe overrides
      SPRING_JPA_SHOW_SQL:                "false"
      SPRING_FLYWAY_REPAIR_ON_MIGRATE:    "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio_net
    restart: unless-stopped

  # ── Vue 3 frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://priyanshu.dev/api
    container_name: portfolio_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - portfolio_net
    restart: unless-stopped

networks:
  portfolio_net:
    driver: bridge

volumes:
  postgres_data:
