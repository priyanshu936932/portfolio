server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Serve the Vue SPA — unknown routes fall back to index.html
    # so vue-router handles client-side navigation correctly.
    # API calls go directly to https://priyanshu.dev/api (different domain),
    # so no proxy block is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for Vite-hashed assets; no cache for the shell HTML
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
