<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Soft glow for the dot -->
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background square -->
  <rect width="100" height="100" rx="22" fill="#070c18"/>
  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="20.5"
        fill="none" stroke="#1e3060" stroke-width="1.5"/>

  <!-- Very faint blue glow behind the P -->
  <ellipse cx="46" cy="40" rx="26" ry="22" fill="#3b82f6" opacity="0.07"/>

  <!-- ── P letterform (geometric paths) ── -->

  <!-- Stem — left vertical bar -->
  <rect x="17" y="16" width="15" height="66" rx="7" fill="url(#grad)"/>

  <!-- Bowl — outer D shape:
       starts at (32,16), goes right to (54,16),
       arcs around (right peak at ~74,36) back to (54,56), then left to (32,56) -->
  <path d="M32 16 L54 16 A20 20 0 0 1 54 56 L32 56 Z" fill="url(#grad)"/>

  <!-- Bowl — inner cutout (creates the open ring look):
       same arc logic but radius 10 and offset 10px inward -->
  <path d="M32 26 L54 26 A10 10 0 0 1 54 46 L32 46 Z" fill="#070c18"/>

  <!-- ── Cyan dot (the . in priyanshu.) ── -->
  <!-- glow halo -->
  <circle cx="77" cy="76" r="14" fill="url(#dotglow)"/>
  <!-- solid dot -->
  <circle cx="77" cy="76" r="7.5" fill="#22d3ee"/>
</svg>
